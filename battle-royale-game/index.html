<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Royale Tournament</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🏆 Battle Royale Tournament</h1>

        <!-- SETUP -->
        <div class="setup-box">

            <input type="number" id="playerCount" placeholder="Number of Players">

            <button onclick="createPlayerInputs()">
                Start Tournament
            </button>

            <div id="playerInputs"></div>

        </div>

        <!-- MATCH AREA -->
        <div class="match-box">

            <h2 id="roundTitle">Waiting...</h2>

            <div id="matchArea"></div>

        </div>

        <!-- BRACKET -->
        <div class="bracket-box">

            <h2>🎮 Tournament Bracket</h2>

            <div id="bracket"></div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
